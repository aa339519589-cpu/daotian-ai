services:
  - type: web
    name: daotian-ai
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    disk:
      name: daotian-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: PUBLIC_CHAT_ENABLED
        value: true
      - key: PUBLIC_CHAT_DAILY_LIMIT
        value: 100
      - key: ADMIN_TOKEN
        sync: false
