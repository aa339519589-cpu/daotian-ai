<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#f5f2ea" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1f1f1e" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>稻田 Ai</title>
  <link rel="stylesheet" href="./styles.css?v=v605" />
  <link rel="stylesheet" href="./thinking-position-fix.css?v=v605" />
  <link rel="stylesheet" href="./dark-theme-colors.css?v=v605" />
  <link rel="stylesheet" href="./claude-visual-polish.css?v=v605" />
  <style>
    [data-theme="dark"] .send:not(.stop-mode){
      background:rgba(160,120,90,.75)!important;
      color:#FFFFFF!important;
      border-radius:12px!important;
      box-shadow:none!important;
      font-size:0!important;
    }
    [data-theme="dark"] .send:not(.stop-mode):active{
      background:rgba(160,120,90,.88)!important;
      transform:translateY(1px)!important;
    }
    [data-theme="dark"] .send:not(.stop-mode):disabled{
      background:rgba(160,120,90,.38)!important;
      color:rgba(255,255,255,.82)!important;
      box-shadow:none!important;
    }
  </style>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      options: {
        skipHtmlTags: ['script','noscript','style','textarea','pre','code']
      },
      startup: { typeset: false }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js" onload="try{mermaid.initialize({startOnLoad:false,theme:'dark'});}catch(e){}"></script>
  <script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/common.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist-min@2.35.2/plotly.min.js"></script>
  <script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.0/dist/transformers.min.js';
    window.__HF = window.__HF || {};
    window.__HF.pipeline = pipeline;
    (async function() {
      try {
        var ext = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', { quantized: true });
        window.__HF.extractor = ext;
        window.__HF.loaded = true;
        console.log('[MemEngine] Model loaded');
      } catch(e) {
        console.warn('[MemEngine] Model failed:', e.message);
        window.__HF.loaded = false;
      }
    })();
  </script>
</head>
<body>
  <div id="app">
    <div style="padding:24px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang SC','Hiragino Sans GB','Microsoft YaHei UI',sans-serif;color:#eeeeee;background:#1f1f1e;font-size:16px">稻田 Ai 正在加载...</div>
  </div>
  <script src="./upload-hotfix.js?v=v605"></script>

  <script src="./daotian-preferences-lock.js?v=v609"></script>

  <script src="./model-utils.js?v=modelutils1"></script>
  <script src="./tts-utils.js?v=ttsutils1"></script>
  <script src="./app.js?v=v605"></script>
  <link rel="stylesheet" href="./claude-final-override.css?v=v605" />
  <link rel="stylesheet" href="./font-color-override.css?v=v606" />
  <link rel="stylesheet" href="./light-mode-restore.css?v=v607" />
  <link rel="stylesheet" href="./settings-shell-fix.css?v=v607" />
  <link rel="stylesheet" href="./keyboard-viewport-mode.css?v=v608" />
  <link rel="stylesheet" href="./daotian-font-unify.css?v=v609" />
  <link rel="stylesheet" href="./daotian-ui-cleanup.css?v=v612" />
  <style>
    .app-shell[data-theme="light"] .main,
    .app-shell[data-theme="light"] .messages,
    .app-shell[data-theme="light"] .message,
    .app-shell[data-theme="light"] .assistant-content,
    .app-shell[data-theme="light"] .assistant-render,
    .app-shell[data-theme="light"] .assistant-render *,
    .app-shell[data-theme="light"] .bubble,
    .app-shell[data-theme="light"] .bubble *,
    .app-shell[data-theme="light"] .chat-topbar,
    .app-shell[data-theme="light"] .model-top-trigger,
    .app-shell[data-theme="light"] .model-top-trigger *,
    .app-shell[data-theme="light"] .top-new-chat-btn,
    .app-shell[data-theme="light"] .tts-play-btn,
    .app-shell[data-theme="light"] .voice-float,
    .app-shell[data-theme="light"] .speaker-btn,
    .app-shell[data-theme="light"] textarea,
    .app-shell[data-theme="light"] input,
    .app-shell[data-theme="light"] select,
    .app-shell[data-theme="light"] button:not(.send),
    .app-shell[data-theme="light"] .sidebar,
    .app-shell[data-theme="light"] .sidebar *{
      color:#2a2824!important;
      -webkit-text-fill-color:#2a2824!important;
      opacity:1!important;
      text-shadow:none!important;
    }
    .app-shell[data-theme="light"] textarea::placeholder{
      color:rgba(42,40,36,.48)!important;
      -webkit-text-fill-color:rgba(42,40,36,.48)!important;
    }
    .app-shell[data-theme="light"] .send,
    .app-shell[data-theme="light"] .send *{
      color:#fff!important;
      -webkit-text-fill-color:#fff!important;
    }
  </style>

  <script src="./daotian-ui-cleanup.js?v=v612"></script>
</body>
</html>
