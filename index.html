<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-visual" />
  <meta name="theme-color" content="#f5f2ea" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1F1F1E" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>稻田 Ai</title>
  <link rel="stylesheet" href="./styles.css?v=v603" />
  <link rel="stylesheet" href="./thinking-position-fix.css?v=v603" />
  <link rel="stylesheet" href="./dark-theme-colors.css?v=v603" />
  <link rel="stylesheet" href="./claude-visual-polish.css?v=v603" />
  <style>
    [data-theme="dark"] .send:not(.stop-mode){
      background:#C15F3C!important;
      color:#FFFFFF!important;
      border-radius:12px!important;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 8px 20px rgba(0,0,0,.24)!important;
    }
    [data-theme="dark"] .send:not(.stop-mode):active{
      background:#B75635!important;
      transform:translateY(1px)!important;
    }
    [data-theme="dark"] .send:not(.stop-mode):disabled{
      background:rgba(193,95,60,.48)!important;
      color:rgba(255,255,255,.82)!important;
      box-shadow:none!important;
    }
  </style>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      options: {
        skipHtmlTags: ['script','noscript','style','textarea','pre','code']
      },
      startup: { typeset: false }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js" onload="try{mermaid.initialize({startOnLoad:false,theme:'dark'});}catch(e){}"></script>
  <script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/common.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist-min@2.35.2/plotly.min.js"></script>
  <script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.0/dist/transformers.min.js';
    window.__HF = window.__HF || {};
    window.__HF.pipeline = pipeline;
    (async function() {
      try {
        var ext = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', { quantized: true });
        window.__HF.extractor = ext;
        window.__HF.loaded = true;
        console.log('[MemEngine] Model loaded');
      } catch(e) {
        console.warn('[MemEngine] Model failed:', e.message);
        window.__HF.loaded = false;
      }
    })();
  </script>
</head>
<body>
  <div id="app">
    <div style="padding:24px;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;color:#222">稻田 Ai 正在加载...</div>
  </div>
  <script src="./upload-hotfix.js?v=v603"></script>
  <script src="./stream-smooth-hotfix.js?v=v603"></script>
  <script src="./app.js?v=v603"></script>
  <link rel="stylesheet" href="./claude-final-override.css?v=v603" />
  <script src="./prompt-hotfix.js?v=v603"></script>
  <script src="./thinking-position-fix.js?v=v603"></script>
  <script src="./thinking-canvas-loader.js?v=v603"></script>
</body>
</html>
